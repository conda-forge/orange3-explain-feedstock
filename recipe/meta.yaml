{% set name = "Orange3-Explain" %}
{% set version = "0.6.11" %}
{% set python_min = "3.11" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | replace('-', '_') | lower }}-{{ version }}.tar.gz
  sha256: bae4eeca55b41e95b19fd73df2d76fae28a1b14598c06a0b6c4a83ff72d96ebf

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - AnyQt >=0.2.0
    - Orange3 >=3.39.0
    - orange-canvas-core >=0.2.5
    - orange-widget-base >=4.25.0
    - pandas >=2.2.2
    - scikit-learn >=1.7.0
    - scipy >=1.13.0
    - pyqtgraph >=0.13.1
    - numpy >=2.0.0
    - shap >=0.50.0
  run_constrained:
    # This allows the solver to pick the CUDA version at runtime 
    # for the user, but doesn't force the CI to find it.
    - shap >=0.50.0 *cpu*

test:
  requires:
    - python {{ python_min }}
  imports:
    - orangecontrib.explain

about:
  home: https://github.com/biolab/orange3-explain
  license: GPL-3.0-only
  license_family: GPL
  license_file: LICENSE.txt
  summary: Explainable AI add-on for Orange3
  description: |
    Orange3 Explain is an add-on for the Orange3 data mining suite. 
    It provides extensions for explanatory AI.
  doc_url: http://orange3-explain.readthedocs.io/
  dev_url: https://github.com/biolab/orange3-explain

extra:
  recipe-maintainers:
    - PrimozGodec
    - VesnaT
